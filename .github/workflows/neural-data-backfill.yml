name: publish existing neural DEV bundles

run-name: neural data backfill · source ${{ inputs.source_run_id }}

on:
  workflow_dispatch:
    inputs:
      behavioral_release:
        description: 'Exact behavioral-v3.1-* tag used by the extraction run'
        required: true
        type: string
      source_run_id:
        description: 'Successful v3.1 neural extraction run containing all ten shard artifacts'
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: neural-data-backfill-${{ inputs.source_run_id }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-pipeline.txt
      - name: Install pinned validation dependencies
        run: python -m pip install -r requirements-pipeline.txt
      - name: Validate source and create immutable draft
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          BEHAVIOR_TAG: ${{ inputs.behavioral_release }}
        run: |
          set -euo pipefail
          case "$SOURCE_RUN_ID" in *[!0-9]*|'') echo "::error::source_run_id must be numeric without whitespace"; exit 1;; esac
          case "$BEHAVIOR_TAG" in behavioral-v3.1-*) ;; *) echo "::error::exact behavioral-v3.1 tag required"; exit 1;; esac
          workflow=$(gh run view "$SOURCE_RUN_ID" --json workflowName --jq .workflowName)
          title=$(gh run view "$SOURCE_RUN_ID" --json displayTitle --jq .displayTitle)
          source_sha=$(gh run view "$SOURCE_RUN_ID" --json headSha --jq .headSha)
          test "$workflow" = 'neural DEV v3.1 from behavioral Release'
          test "$title" = "neural DEV · $BEHAVIOR_TAG"
          mkdir -p run/input work assets/extraction-reports
          gh run download "$SOURCE_RUN_ID" -n neural-dev-input -D run/input
          test "$(($(wc -l < run/input/dev_experiments.csv)-1))" -eq 70
          tag="neural-dev-data-${SOURCE_RUN_ID}"
          if gh release view "$tag" >/dev/null 2>&1; then
            draft=$(gh release view "$tag" --json isDraft --jq .isDraft)
            if [ "$draft" != true ]; then
              echo "::error::Release $tag is already public and immutable"
              exit 1
            fi
          else
            printf '# Neural DEV data package\n\n- Source extraction run: `%s`\n- Source commit: `%s`\n- Behavioral source: `%s`\n- Allen NWB re-download: **false**\n\nThe Release remains a draft until every container part and checksum is uploaded.\n' \
              "$SOURCE_RUN_ID" "$source_sha" "$BEHAVIOR_TAG" > release-notes.md
            gh release create "$tag" --target "$source_sha" --title "$tag: immutable DEV neural bundles" \
              --notes-file release-notes.md --latest=false --prerelease --draft
          fi
          printf '%s\n' "$source_sha" > run/source-head-sha.txt
          : > assets/SHA256SUMS
          : > assets/bundle-files.sha256
          : > assets/parts.tsv
          echo 'analysis_only_packaging=true'
          echo 'allen_nwb_download=false'
      - name: Validate, stream-split and upload ten containers
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          tag="neural-dev-data-${SOURCE_RUN_ID}"
          for shard in $(seq 1 10); do
            shard_dir="work/shard-${shard}"
            mkdir -p "$shard_dir"
            gh run download "$SOURCE_RUN_ID" -n "neural-container-$shard" -D "$shard_dir"
            container=$(python - "$shard" <<'PY'
          import pandas as pd, sys
          table=pd.read_csv('run/input/dev_experiments.csv')
          containers=sorted(table.ophys_container_id.astype(int).unique())
          print(containers[int(sys.argv[1])-1])
          PY
          )
            python - "$container" "$shard_dir" <<'PY'
          import hashlib, importlib.util, sys
          from pathlib import Path
          import pandas as pd
          container, root = int(sys.argv[1]), Path(sys.argv[2])
          spec=importlib.util.spec_from_file_location('neural_pipeline','pipeline/verify-neural/neural.py')
          neural=importlib.util.module_from_spec(spec); spec.loader.exec_module(neural)
          manifest=pd.read_csv('run/input/dev_experiments.csv')
          selected=manifest[manifest.ophys_container_id.astype(int).eq(container)].copy()
          if len(selected) != 7:
              raise SystemExit(f'container {container} must contain 7 experiments; got {len(selected)}')
          neural.validate_bundles(root, selected)
          failures=neural.appendix_a_failures(root, selected)
          if failures:
              raise SystemExit(f'Appendix-A validation failed for container {container}: {failures}')
          expected=[]
          for oeid in selected.ophys_experiment_id.astype(int):
              expected.extend(path.name for path in neural.bundle_paths(root, oeid))
          actual={path.name for path in root.iterdir() if path.is_file() and path.name[:1].isdigit()}
          if actual != set(expected):
              raise SystemExit(f'package set mismatch: missing={sorted(set(expected)-actual)}, extra={sorted(actual-set(expected))}')
          (root/'.files.txt').write_text('\n'.join(sorted(expected))+'\n')
          def sha256(path):
              digest=hashlib.sha256()
              with path.open('rb') as stream:
                  for chunk in iter(lambda: stream.read(8*1024*1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()
          with Path('assets/bundle-files.sha256').open('a') as output:
              for name in sorted(expected):
                  digest=sha256(root/name)
                  output.write(f'{digest}  {name}\n')
          PY
            find "$shard_dir" -maxdepth 1 -name '_pull*.json' -exec cp {} assets/extraction-reports/ \;
            tar -C "$shard_dir" -cf - -T "$shard_dir/.files.txt" | \
              split -b 1800M -d -a 2 - "assets/neural-container-${container}.tar.part-"
            for part in assets/neural-container-${container}.tar.part-*; do
              name=$(basename "$part")
              digest=$(sha256sum "$part" | cut -d' ' -f1)
              size=$(stat -c%s "$part")
              printf '%s  %s\n' "$digest" "$name" >> assets/SHA256SUMS
              printf '%s\t%s\t%s\t%s\n' "$container" "$name" "$digest" "$size" >> assets/parts.tsv
              gh release upload "$tag" "$part" --clobber
              rm "$part"
            done
            rm -rf "$shard_dir"
          done
      - name: Publish manifests and make data Release public
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          BEHAVIOR_TAG: ${{ inputs.behavioral_release }}
        run: |
          set -euo pipefail
          tag="neural-dev-data-${SOURCE_RUN_ID}"
          cp run/input/dev_experiments.csv run/input/behavior/behavioral-manifest.json assets/
          tar -czf assets/extraction-reports.tar.gz -C assets/extraction-reports .
          python -m pip freeze > assets/backfill-packaging-environment.txt
          python - <<'PY'
          import csv, datetime, hashlib, json, os
          from pathlib import Path
          experiments=list(csv.DictReader(Path('assets/dev_experiments.csv').open()))
          parts=[]
          for line in Path('assets/parts.tsv').read_text().splitlines():
              container,name,digest,size=line.split('\t')
              parts.append({'container_id':int(container),'name':name,'sha256':digest,'size':int(size)})
          source_sha=Path('run/source-head-sha.txt').read_text().strip()
          manifest={'schema':'neural-dev-data-v1','source_extraction_run':int(os.environ['SOURCE_RUN_ID']),
                    'source_commit':source_sha,'behavioral_release':os.environ['BEHAVIOR_TAG'],
                    'n_experiments':len(experiments),'n_containers':len({r['ophys_container_id'] for r in experiments}),
                    'parts':parts,'bundle_checksum_file':'bundle-files.sha256',
                    'analysis_only_packaging':True,'allen_nwb_download':False}
          Path('assets/data-package-manifest.json').write_text(json.dumps(manifest,indent=2)+'\n')
          provenance={'date_utc':datetime.datetime.now(datetime.timezone.utc).isoformat(),
                      'packaging_commit':os.environ['GITHUB_SHA'],'source_commit':source_sha,
                      'source_extraction_run':int(os.environ['SOURCE_RUN_ID']),
                      'workflow_run':f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
                      'analysis_only_packaging':True,'allen_nwb_download':False}
          Path('assets/neural-data-provenance.json').write_text(json.dumps(provenance,indent=2)+'\n')
          PY
          rm assets/parts.tsv
          for file in assets/bundle-files.sha256 assets/data-package-manifest.json \
                      assets/dev_experiments.csv assets/behavioral-manifest.json \
                      assets/extraction-reports.tar.gz assets/backfill-packaging-environment.txt \
                      assets/neural-data-provenance.json; do
            sha256sum "$file" | sed 's#assets/##' >> assets/SHA256SUMS
            gh release upload "$tag" "$file" --clobber
          done
          gh release upload "$tag" assets/SHA256SUMS --clobber
          test "$(python -c 'import json; print(json.load(open("assets/data-package-manifest.json"))["n_experiments"])')" -eq 70
          test "$(python -c 'import json; print(json.load(open("assets/data-package-manifest.json"))["n_containers"])')" -eq 10
          gh release edit "$tag" --draft=false --prerelease --latest=false
