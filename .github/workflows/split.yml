name: freeze split

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write

concurrency:
  group: freeze-split-once
  cancel-in-progress: false

env:
  GH_REPO: ${{ github.repository }}
  PYTHON_VERSION: '3.11'
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.lock.outputs.should-run }}
    steps:
      - name: Enforce the one-time split lock
        id: lock
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view split-lock >/dev/null 2>&1; then
            echo 'should-run=false' >> "$GITHUB_OUTPUT"
            echo 'split-lock already exists; the split cannot be drawn again.'
          else
            echo 'should-run=true' >> "$GITHUB_OUTPUT"
          fi
      - name: Disable an already completed workflow
        if: steps.lock.outputs.should-run == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable split.yml

  tests:
    needs: guard
    if: needs.guard.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-pipeline.txt
      - name: Install pipeline dependencies
        run: python -m pip install -r requirements-pipeline.txt
      - name: Run offline tests
        run: python -m unittest discover -s tests -v
      - name: Compile command-line entrypoints
        run: |
          python -m py_compile pipeline/draw/split.py
          python -m py_compile pipeline/verify-behavioral/behavioral.py

  draw-and-release:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-pipeline.txt
      - name: Install pipeline dependencies
        run: python -m pip install -r requirements-pipeline.txt
      - name: Draw and strictly verify split
        run: |
          set -o pipefail
          mkdir -p run/split
          python pipeline/draw/split.py build --out run/split \
            2>&1 | tee run/split/build.log
          python pipeline/draw/split.py verify run/split/split_manifest.json \
            2>&1 | tee run/split/verify.log
          python -m pip freeze > run/split-environment.txt
      - name: Package immutable release assets
        run: |
          mkdir -p assets
          tar -czf assets/split.tar.gz -C run split
          cp run/split-environment.txt assets/
          cd assets
          sha256sum split.tar.gz split-environment.txt > SHA256SUMS
      - name: Write release notes
        run: |
          python - <<'PY'
          import json
          import os
          import csv
          from pathlib import Path

          manifest = json.loads(Path("run/split/split_manifest.json").read_text())
          with Path("run/split/dev_mice.csv").open(newline="") as handle:
              n_dev_sessions = sum(1 for _ in csv.DictReader(handle))
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )
          notes = f"""# Frozen dev split

          - Source commit: `{os.environ['GITHUB_SHA']}`
          - Workflow run: {run_url}
          - Allen manifest: `{manifest['allen_manifest']}`
          - DEV checksum: `{manifest['dev_checksum']}`
          - DEV sessions: {n_dev_sessions}

          This Release is the immutable split input for the manual behavioral-scan
          workflow. No behavioral data was read while drawing this split.
          """
          Path("release-notes.md").write_text(
              "\n".join(line.strip() for line in notes.splitlines()) + "\n"
          )
          PY
      - name: Publish frozen split Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view split-lock >/dev/null 2>&1; then
            echo '::error::split-lock appeared during this run; refusing to overwrite it.'
            exit 1
          fi
          gh release create split-lock assets/* \
            --target "$GITHUB_SHA" \
            --title 'split-lock: frozen dev split' \
            --notes-file release-notes.md \
            --latest
      - name: Permanently disable split workflow after publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable split.yml
      - name: Upload short-lived diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: split-${{ github.run_id }}
          path: |
            run/split/
            assets/
          retention-days: 1
          if-no-files-found: warn
          overwrite: true
